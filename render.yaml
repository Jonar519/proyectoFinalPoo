# Blueprint Render — backend con Docker + PostgreSQL
# Uso: Render Dashboard → New → Blueprint → selecciona este repo

services:
  - type: web
    name: aircontrol-pro-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d8bpcp4m0tmc73eoea0g-a.oregon-postgres.render.com:5432/trabajo_final_m90z?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: trabajo_final_m90z_user
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: http://localhost:4200,https://*.vercel.app,https://*.onrender.com
