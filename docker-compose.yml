services:
  postgres:
    image: postgres:16-alpine
    container_name: aircontrolpro-db
    environment:
      POSTGRES_DB: aircontrolpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aircontrolpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aircontrolpro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aircontrolpro_pgdata:
