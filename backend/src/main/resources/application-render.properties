# Perfil Render (PostgreSQL en la nube + despliegue del backend)
# Activar: SPRING_PROFILES_ACTIVE=render
#
# En el panel de Render define al menos:
#   SPRING_DATASOURCE_PASSWORD = (password de la base de datos)
#   CORS_ALLOWED_ORIGIN_PATTERNS = https://tu-frontend.onrender.com,http://localhost:4200
#   JWT_SECRET = (cadena larga aleatoria)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://dpg-d8bpcp4m0tmc73eoea0g-a.oregon-postgres.render.com:5432/trabajo_final_m90z?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:trabajo_final_m90z_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Flyway crea/actualiza el esquema (no usar ddl-auto=update en produccion)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Render inyecta PORT; localmente usa 8080
server.port=${PORT:8080}

logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari.HikariConfig=INFO

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,https://*.vercel.app,https://*.onrender.com}

aircontrol.workflow.simulation-minutes=${WORKFLOW_SIMULATION_MINUTES:10}
