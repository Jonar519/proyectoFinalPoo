spring.application.name=aircontrol-pro

# Perfil por defecto: local (PostgreSQL en puerto 5440).
# Docker:  -Dspring-boot.run.profiles=docker
# Render:  -Dspring-boot.run.profiles=render  (ver application-render.properties)
spring.profiles.active=render

# CORS (local). En Render se sobreescribe en application-render.properties
app.cors.allowed-origin-patterns=http://localhost:4200

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080
server.error.include-message=always

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-token.expiration=604800000

# Diagnostico de conexion (ver URL en consola al arrancar)
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG

# Simulacion de vuelo en ruta (minutos entre despegue y aterrizaje automatico)
aircontrol.workflow.simulation-minutes=10
